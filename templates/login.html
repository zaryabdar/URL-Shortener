{% extends 'base.html' %}
{% block body %}

    <h2>Login Form</h2>

    <form action="POST">

        <div>
            {{form.email.label}}
            {{form.email()}}
        </div>

        <div>
            {{form.password.label}}
            {{form.password()}}
        </div>

        <div>
            {{form.remember_me.label}}
            {{form.remember_me()}}
        </div>

        <div>
            {{form.submit()}}
        </div>

    </form>
    
{% endblock body %}
