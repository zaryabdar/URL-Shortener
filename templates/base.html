<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="static\styles\style.css">
</head>

<body>
    {% with messages = get_flashed_messages(with_categories=True) %}

    {% for category, message in messages %}
     <div class="{{ category }}">
                {{ message }}

    {% endif %}
    {% endwith %}

    {% endblock body %}
</body>

</html>
